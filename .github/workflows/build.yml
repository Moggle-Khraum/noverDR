name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good libsqlite3-dev \
            sqlite3 bzip2 libbz2-dev libssl-dev openssl libgdbm-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev uuid-dev libffi-dev \
            tk-dev unzip zip liblzma-dev autoconf automake libtool pkg-config \
            cmake ninja-build autoconf-archive libltdl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer "cython<3.0"

      - name: Build with Buildozer
        run: |
          # We clean the environment to prevent the __GNUC_PREREQ header leak
          buildozer android clean
          yes | buildozer android debug
        env:
          USER: runner
          # Prevent the compiler from accidentally picking up host system headers
          C_INCLUDE_PATH: ""
          CPLUS_INCLUDE_PATH: ""

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovelDR-Debug-APK
          path: bin/*.apk
