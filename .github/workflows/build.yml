name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.11'

      # 2. Install system dependencies for Buildozer
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline-dev \
            uuid-dev \
            libffi-dev \
            tk-dev \
            unzip \
            zip \
            liblzma-dev

      # 3. Build the APK using Buildozer Action
      # We removed 'repository_display_name' to fix the warning
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          buildozer_version: master
          command: buildozer android debug

      # 4. Upload the resulting APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NovelDR-Debug-APK
          path: bin/*.apk
